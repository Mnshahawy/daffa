# Daffa — self-hosted Docker operations console.
#
# This template runs Daffa with a bundled PostgreSQL and, optionally, a Traefik
# reverse proxy that terminates TLS with an automatic Let's Encrypt certificate.
#
# It is driven entirely by the neighbouring .env file (copy .env.example → .env).
# The install.sh script writes that .env for you and brings this up; you can also
# edit it by hand and run `docker compose up -d` yourself.
#
# Two modes, selected by whether COMPOSE_PROFILES includes `traefik`:
#
#   • traefik  — Daffa sits behind Traefik on :443, Secure cookies on, real TLS.
#                Requires DAFFA_DOMAIN (a DNS name pointing at this host) and
#                ACME_EMAIL. This is the production shape.
#   • direct   — no proxy; Daffa is published on 127.0.0.1 in plain http with
#                Secure cookies off. Only safe for a local machine or behind a
#                proxy you run yourself. Put a TLS terminator in front before
#                exposing it to a network.
#
# Note on the database: Daffa's own default is SQLite, and it never provisions a
# database on its own. This template bundles PostgreSQL because an install that
# ships its own datastore is what most people expect from a one-command setup —
# but nothing here is load-bearing for Daffa. Point DAFFA_DB_URL at an existing
# cluster (or drop to sqlite://) and the postgres service below becomes dead weight
# you can delete.

name: daffa

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: daffa
      POSTGRES_DB: daffa
      # The compose file refuses to start if this is unset, rather than silently
      # bringing up a database with an empty password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env}
    volumes:
      - daffa-pg:/var/lib/postgresql/data
    healthcheck:
      # Daffa depends on this being healthy, so `up` waits for Postgres to accept
      # connections instead of racing it and logging a connection error on boot.
      test: ["CMD-SHELL", "pg_isready -U daffa -d daffa"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    # Only on the internal network — the database is never reachable from the edge
    # where the proxy lives.
    networks: [internal]

  daffa:
    image: ${DAFFA_IMAGE:-ghcr.io/mnshahawy/daffa:latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # sslmode=disable is correct here: the connection never leaves the compose
      # network, so there is nothing on the wire to intercept.
      DAFFA_DB_URL: postgres://daffa:${POSTGRES_PASSWORD}@postgres:5432/daffa?sslmode=disable
      # On behind Traefik (TLS), off for plain-http direct mode — the browser drops
      # a Secure cookie over http and you would never stay signed in.
      DAFFA_SECURE_COOKIE: ${DAFFA_SECURE_COOKIE:-true}
      # Only believe X-Forwarded-For when a proxy we run is actually in front.
      DAFFA_TRUST_PROXY: ${DAFFA_TRUST_PROXY:-true}
      # The stack's own networks and volumes, marked `system` so they cannot be removed
      # from the console — deleting the console's own plumbing is not a click we allow.
      DAFFA_SYSTEM_NETWORKS: ${DAFFA_SYSTEM_NETWORKS:-}
      DAFFA_SYSTEM_VOLUMES: ${DAFFA_SYSTEM_VOLUMES:-}
    volumes:
      # State: the SQLite file (unused here) and, crucially, master.key — the seal
      # for every secret Daffa stores. Back this volume up; losing it means
      # re-entering every registry password and IdP client secret.
      - daffa-data:/var/lib/daffa
      # Daffa operates the daemon on this box through its socket.
      - /var/run/docker.sock:/var/run/docker.sock
      # The deployment directory, read-only: `daffa stack adopt` reads this compose file
      # and .env from here to register itself as an editable stack. Absolute host path so a
      # redeploy through Daffa's runner resolves it the same way (a relative path would
      # resolve inside the runner). See docs — relative bind mounts and the runner.
      - ${DAFFA_CONFIG_DIR:-/opt/daffa}:/etc/daffa:ro
    # The image runs as a non-root user; joining the host's docker group is what
    # lets it read the root-owned socket without running as root. install.sh fills
    # DOCKER_GID in from `getent group docker`.
    group_add:
      - ${DOCKER_GID:-999}
    # Always published on loopback so the installer (and you) can reach /healthz
    # and the API locally. In traefik mode this stays on 127.0.0.1 — it is a local
    # convenience, not a way around TLS. Set DAFFA_BIND=0.0.0.0 only in direct mode
    # and only when you have your own TLS in front.
    ports:
      - "${DAFFA_BIND:-127.0.0.1}:${DAFFA_PORT:-8080}:8080"
    labels:
      # Inert unless the traefik service is running (the `traefik` profile). Daffa
      # in direct mode carries these harmlessly.
      #
      # Per-router TLS, so this proxy can serve public and internal sites side by side.
      # DAFFA_CERTRESOLVER is `le` for a public console (Traefik gets a Let's Encrypt cert)
      # and empty for an internal one (Daffa delivers the cert into the file provider, and
      # Traefik serves it by SNI / as the default). Only THIS router's strategy is tied to
      # Daffa's install mode — other sites choose their own.
      - "traefik.enable=true"
      - "traefik.http.routers.daffa.rule=Host(`${DAFFA_DOMAIN:-daffa.local}`)"
      - "traefik.http.routers.daffa.entrypoints=websecure"
      - "traefik.http.routers.daffa.tls=true"
      - "traefik.http.routers.daffa.tls.certresolver=${DAFFA_CERTRESOLVER:-}"
      - "traefik.http.services.daffa.loadbalancer.server.port=8080"
      # Daffa is on two networks; tell Traefik which one to reach it on, or it may
      # pick the container's internal-network IP that Traefik can't route to.
      - "traefik.docker.network=daffa-edge"
    restart: unless-stopped
    # The only service on both networks: it talks to Postgres on `internal` and is
    # proxied from `edge`.
    networks: [internal, edge]

  traefik:
    # v3.6.7, not an older v3: Docker Engine 29 raised its minimum API version to 1.40, and
    # Traefik's Docker provider (which forces API-version negotiation and ignores
    # DOCKER_API_VERSION) probes with a stale default on older builds — the provider then
    # never loads, so no router is created and the console is unreachable behind a default
    # cert. v3.6.7 negotiates correctly against Docker 29. Do not downgrade.
    image: traefik:v3.6.7
    # Only present when COMPOSE_PROFILES=traefik. In direct mode this service is
    # never created.
    profiles: [traefik]
    # The static config is a mounted file, not command flags, so that the ONE thing that
    # differs between a public (ACME) and an internal (Daffa-issued) install is which
    # traefik.yml sits next to this compose file — the compose itself stays identical.
    # traefik reads /etc/traefik/traefik.yml on its own; no command needed.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only: Traefik only needs to watch for container labels, never to act
      # on the daemon.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static config (traefik.yml), in a Daffa-managed volume rather than a host file, so
      # it is editable in the console (an inline volume source delivers it). The installer
      # seeds it before Traefik's first start; edits apply on the next stack redeploy, since
      # Traefik reads its static config once at startup.
      - traefik-config:/etc/traefik:ro
      # Dynamic config the file provider watches: delivered certificates AND any middlewares
      # you add — both Daffa-managed, coexisting in one directory (each writer touches only
      # its own files). The mount path is the convention Daffa's cert fragment assumes.
      - edge-certs:/etc/traefik/dynamic-certs:ro
      # ACME account + issued certs (public-domain mode). Empty and unused in internal mode.
      - traefik-acme:/acme
    restart: unless-stopped
    # Edge networks only — the proxy has no path to the database network. `edge` carries the
    # console; `edge-overlay` carries PUBLISHED STACKS. Traefik sits on both, so one proxy serves
    # the console and cluster apps alike.
    networks: [edge, edge-overlay]

volumes:
  # Explicit names on every volume: without them Compose prefixes the project name
  # (daffa_daffa-data, …), which would NOT match the plain names install.sh writes into
  # DAFFA_SYSTEM_VOLUMES — so Daffa's "system, cannot delete" protection would silently
  # cover nothing for the data and database volumes. The names here are the contract.
  daffa-data:
    name: daffa-data
  daffa-pg:
    name: daffa-pg
  traefik-acme:
    name: traefik-acme
  # Daffa delivers the edge certificate + Traefik file-provider fragment here. Named
  # explicitly so `daffa edge init --volume daffa-edge-certs` and the mount above agree.
  edge-certs:
    name: daffa-edge-certs
  # Traefik's static config (traefik.yml). external: true because install.sh creates and
  # seeds this volume (with traefik.yml AND the dynamic-certs mountpoint) BEFORE Traefik's
  # first start — Traefik reads its static config once at boot, so Compose must not try to
  # own or recreate it. Marking it external also silences the "already exists but was not
  # created by Docker Compose" warning on every deploy.
  traefik-config:
    external: true
    name: daffa-traefik-config

networks:
  # daffa <-> postgres. No proxy here.
  internal:
    name: daffa-internal
  # traefik <-> daffa. A plain bridge: the console and the proxy are always on the same host.
  edge:
    name: daffa-edge
  # traefik <-> PUBLISHED STACKS. An attachable overlay on a Swarm manager (the default), so a
  # replicated service's tasks are reachable no matter which node runs them; a plain bridge under
  # --no-swarm. `attachable` lets this compose Traefik (a container, not a Swarm service) join it,
  # and Swarm stacks attach to `daffa-edge-overlay` as an external network. install.sh writes the
  # driver to match the install mode; the default here follows Swarm-by-default.
  edge-overlay:
    name: daffa-edge-overlay
    driver: ${DAFFA_EDGE_OVERLAY_DRIVER:-overlay}
    attachable: true
