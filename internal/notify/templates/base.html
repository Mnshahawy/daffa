{{define "base"}}<!doctype html>
<html>
  <head><meta charset="utf-8" /><meta name="color-scheme" content="light dark" /></head>
  <body style="margin:0;padding:0;background:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e4e4e7;">

            <!-- A red bar for a failure, a green one for a success. The colour is the first
                 thing read on a phone at 2am, so it must not lie. -->
            <tr>
              <td style="height:4px;background:{{if .Failed}}#dc2626{{else}}#16a34a{{end}};font-size:0;line-height:0;">&nbsp;</td>
            </tr>

            <tr>
              <td style="padding:24px 28px 8px 28px;">
                <p style="margin:0 0 4px 0;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#71717a;">Daffa</p>
                <h1 style="margin:0;font-size:18px;font-weight:600;color:#18181b;">{{.Title}}</h1>
              </td>
            </tr>

            <tr>
              <td style="padding:4px 28px 0 28px;">
                <p style="margin:0;font-size:14px;line-height:1.6;color:#3f3f46;">{{.Summary}}</p>
              </td>
            </tr>

            {{if .Detail}}
            <tr>
              <td style="padding:16px 28px 0 28px;">
                <pre style="margin:0;padding:12px 14px;background:#fafafa;border:1px solid #e4e4e7;border-radius:8px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.5;color:#3f3f46;white-space:pre-wrap;word-break:break-word;">{{.Detail}}</pre>
              </td>
            </tr>
            {{end}}

            {{if .Link}}
            <tr>
              <td style="padding:20px 28px 0 28px;">
                <a href="{{.Link}}" style="display:inline-block;padding:9px 16px;background:#18181b;color:#ffffff;font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;">Open in Daffa</a>
              </td>
            </tr>
            {{end}}

            <tr>
              <td style="padding:24px 28px 24px 28px;">
                <p style="margin:0;font-size:12px;color:#a1a1aa;">
                  You are receiving this because of a notification rule in Daffa. An administrator can change it under Settings → Notifications.
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
{{end}}
