<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Daffa">
  <title>Daffa</title>
  <!--
    دفّة — the helm.

    A stencil D, which is also the profile of a rudder blade, cut through by its waterline.
    Above the line is the turquoise of shallow water; below it, deep indigo. A rudder does
    nothing above the surface, so the mark is weighted below the cut.

    The counter is what keeps it a letterform rather than a blob, and it is why this still
    reads at 16px where a spoked ship's wheel would turn to mush.
  -->
  <defs>
    <linearGradient id="daffa-depth" x1="4" y1="2" x2="26" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#45ced2" />
      <stop offset="0.55" stop-color="#6e57e5" />
      <stop offset="1" stop-color="#5943bf" />
    </linearGradient>
    <mask id="daffa-waterline">
      <rect width="32" height="32" fill="#fff" />
      <rect y="14.9" width="32" height="2.2" fill="#000" />
    </mask>
  </defs>

  <path
    fill="url(#daffa-depth)"
    mask="url(#daffa-waterline)"
    fill-rule="evenodd"
    d="M5 3h11c7.2 0 12.5 5.6 12.5 13S23.2 29 16 29H5zm6 6v14h4.5c4 0 7-2.8 7-7s-3-7-7-7z"
  />
</svg>
