<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Daffa">
  <title>Daffa</title>
  <!--
    The tab icon is a tile, not a bare glyph. A transparent mark has to survive both a white
    and a near-black tab strip and something always gives; a tile brings its own background
    and reads identically on either. The rudder is knocked out in white so that when the
    browser scales this down to 16px there is still maximum contrast left to lose.
  -->
  <defs>
    <linearGradient id="daffa-tile" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#45ced2" />
      <stop offset="0.55" stop-color="#6e57e5" />
      <stop offset="1" stop-color="#5943bf" />
    </linearGradient>
    <mask id="daffa-waterline-tile">
      <rect width="32" height="32" fill="#fff" />
      <rect y="14.9" width="32" height="2.2" fill="#000" />
    </mask>
  </defs>

  <rect width="32" height="32" rx="7.5" fill="url(#daffa-tile)" />

  <g transform="translate(3.4 3.4) scale(0.79)">
    <path
      fill="#fff"
      mask="url(#daffa-waterline-tile)"
      fill-rule="evenodd"
      d="M5 3h11c7.2 0 12.5 5.6 12.5 13S23.2 29 16 29H5zm6 6v14h4.5c4 0 7-2.8 7-7s-3-7-7-7z"
    />
  </g>
</svg>
