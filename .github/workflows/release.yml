name: Release

# Manual only. A release cuts a tag, builds the multi-arch image, pushes it to GHCR, and
# opens a GitHub Release. Nothing here fires on push — a tag exists because someone chose
# to ship, not because a commit landed.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.2.3"
        required: true
        type: string
      latest:
        description: "Also tag the image :latest"
        required: false
        type: boolean
        default: true

# contents: write cuts the tag and the Release; packages: write pushes to GHCR.
permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Cut ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Fail early on a typo'd version rather than after building an image no one can find.
      - name: Validate version
        run: |
          version='${{ github.event.inputs.version }}'
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Version must look like v1.2.3 (optionally v1.2.3-rc.1); got '$version'"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "::error::Tag $version already exists"
            exit 1
          fi

      # Tag the exact commit this workflow ran against. Tags pushed with GITHUB_TOKEN do
      # not retrigger workflows, so there is no risk of a release loop.
      - name: Create and push tag
        run: |
          version='${{ github.event.inputs.version }}'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "Daffa $version"
          git push origin "$version"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the owner (GHCR rejects uppercase) and expands the tag
      # set. :latest is opt-out via the workflow input for pre-releases.
      #
      # The raw tag below pushes the git tag verbatim (e.g. v1.2.3) as an image tag, in
      # addition to the semver-normalised 1.2.3 / 1.2. deploy/install.sh reads the git tag
      # from the releases API and uses it unchanged for the compose ref AND the image, so
      # the tag must exist on the image exactly as written — this is what makes that hold.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }}
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }}
            type=raw,value=latest,enable=${{ github.event.inputs.latest }}

      # The static, CGO-off binary cross-compiles cleanly, so both arches build from the
      # one Dockerfile. VERSION lands in the binary via -X main.version.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --generate-notes diffs against the previous tag on its own. A version with a
      # pre-release suffix (v1.2.3-rc.1) is flagged so it does not become "latest release".
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version='${{ github.event.inputs.version }}'
          prerelease=""
          case "$version" in *-*) prerelease="--prerelease";; esac
          gh release create "$version" \
            --title "Daffa $version" \
            --generate-notes \
            $prerelease
