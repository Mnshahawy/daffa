name: Feature request
description: Suggest a capability or change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do today? Describe the situation, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Optional. How might Daffa address this?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / workarounds
      description: What do you do today instead?
